<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">1410-style company drill board</title>
<desc id="desc">FireOps Calc training board for pump, hose, water supply, standpipe, master stream, and relay-style company drills.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#06070a"/><stop offset="1" stop-color="#1a1110"/></linearGradient>
  <linearGradient id="card" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff5e4"/><stop offset="1" stop-color="#ead8bb"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000" flood-opacity=".45"/></filter>
</defs>
<rect width="1600" height="900" fill="url(#bg)"/>
<rect x="38" y="38" width="1524" height="824" rx="28" fill="none" stroke="#a87521" stroke-width="5"/>
<text x="800" y="120" text-anchor="middle" fill="#f4efe5" font-family="Arial Black, Impact, sans-serif" font-size="88" letter-spacing="2">1410-STYLE</text>
<text x="800" y="190" text-anchor="middle" fill="#e3372f" font-family="Arial Black, Impact, sans-serif" font-size="72" letter-spacing="1">COMPANY DRILLS</text>
<text x="800" y="240" text-anchor="middle" fill="#f4c44d" font-family="Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="5">FIREOPS CALC TRAINING LIBRARY</text>
<g filter="url(#shadow)">
  <rect x="130" y="310" width="390" height="180" rx="22" fill="url(#card)" stroke="#b8872f" stroke-width="4"/>
  <rect x="605" y="310" width="390" height="180" rx="22" fill="url(#card)" stroke="#b8872f" stroke-width="4"/>
  <rect x="1080" y="310" width="390" height="180" rx="22" fill="url(#card)" stroke="#b8872f" stroke-width="4"/>
  <rect x="130" y="560" width="390" height="180" rx="22" fill="url(#card)" stroke="#b8872f" stroke-width="4"/>
  <rect x="605" y="560" width="390" height="180" rx="22" fill="url(#card)" stroke="#b8872f" stroke-width="4"/>
  <rect x="1080" y="560" width="390" height="180" rx="22" fill="url(#card)" stroke="#b8872f" stroke-width="4"/>
</g>
<g font-family="Arial Black, Impact, sans-serif" fill="#151515" font-size="40">
  <text x="245" y="375">ATTACK LINE</text><text x="720" y="375">WATER SUPPLY</text><text x="1195" y="375">STANDPIPE</text>
  <text x="245" y="625">MASTER STREAM</text><text x="720" y="625">RELAY / LDH</text><text x="1195" y="625">EVALUATOR</text>
</g>
<g font-family="Arial, sans-serif" fill="#2a2722" font-size="24" font-weight="700">
  <text x="245" y="420">Deploy, charge, flow, reset</text><text x="720" y="420">Hydrant, intake, sustain flow</text><text x="1195" y="420">FDC, floor, hose pack, SOP</text>
  <text x="245" y="670">Monitor setup and safe flow</text><text x="720" y="670">Distance, spacing, intake target</text><text x="1195" y="670">Safety, water, comms, timing</text>
</g>
<g fill="#b91515">
  <circle cx="185" cy="390" r="35"/><circle cx="660" cy="390" r="35"/><circle cx="1135" cy="390" r="35"/>
  <circle cx="185" cy="640" r="35"/><circle cx="660" cy="640" r="35"/><circle cx="1135" cy="640" r="35"/>
</g>
<g fill="#fff" font-family="Arial Black, Impact, sans-serif" font-size="40" text-anchor="middle">
  <text x="185" y="404">1</text><text x="660" y="404">2</text><text x="1135" y="404">3</text><text x="185" y="654">4</text><text x="660" y="654">5</text><text x="1135" y="654">✓</text>
</g>
<text x="800" y="830" text-anchor="middle" fill="#f4efe5" font-family="Arial, sans-serif" font-size="25" font-weight="700">Original training organizer — use official NFPA documents and department SOPs for compliance.</text>
</svg>