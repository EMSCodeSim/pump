    *{box-sizing:border-box} body{margin:0;background:linear-gradient(180deg,#06080b,#101722 45%,#06080b);color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif}.topbar{position:sticky;top:0;z-index:10;background:rgba(7,10,14,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08)}.topbar-inner{max-width:1180px;margin:auto;padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}.brand{font-weight:900;letter-spacing:-.04em;font-size:24px}.brand span:first-child{color:var(--red)}.nav-actions{display:flex;gap:10px;flex-wrap:wrap}.btn{appearance:none;border:0;border-radius:12px;background:var(--red);color:#fff;font-weight:800;padding:12px 16px;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 10px 24px rgba(229,57,53,.25)}.btn.secondary{background:#1c2633;border:1px solid #344154;box-shadow:none}.btn.ghost{background:transparent;border:1px solid #3a4655;box-shadow:none}.wrap{max-width:1180px;margin:0 auto;padding:26px 18px 50px}.hero{display:grid;grid-template-columns:1fr;gap:16px;margin-bottom:18px}.eyebrow{color:#ff6b64;text-transform:uppercase;font-weight:900;font-size:12px;letter-spacing:.14em}.hero h1{font-size:clamp(32px,6vw,56px);line-height:.95;margin:8px 0 12px;letter-spacing:-.06em}.hero p{color:var(--muted);font-size:18px;line-height:1.5;max-width:760px}.layout{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(320px,.65fr);gap:18px;align-items:start}.card{background:rgba(18,24,32,.86);border:1px solid rgba(255,255,255,.1);border-radius:22px;box-shadow:0 24px 80px rgba(0,0,0,.35);overflow:hidden}.scene-card{padding:14px}.scene-media{position:relative;border-radius:18px;overflow:hidden;background:#000;min-height:360px}.scene-media img{width:100%;display:block}.overlay-label{position:absolute;left:var(--x);top:var(--y);transform:translate(-50%,-50%);padding:6px 9px;border-radius:999px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.22);color:#fff;font-size:12px;font-weight:900;white-space:nowrap;box-shadow:0 8px 18px rgba(0,0,0,.35)}.scenario-list{padding:16px}.scenario-list h2,.panel h2{margin:0 0 12px;font-size:22px}.scenario-buttons{display:grid;gap:10px}.scenario-option{text-align:left;border:1px solid rgba(255,255,255,.1);background:#0f151d;color:#fff;border-radius:16px;padding:12px;cursor:pointer}.scenario-option.active{outline:2px solid var(--red);background:#1d1515}.scenario-title{font-weight:900}.scenario-meta{font-size:12px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.06em}.panel{padding:18px}.chip{display:inline-flex;align-items:center;border-radius:999px;padding:6px 10px;background:rgba(229,57,53,.13);color:#ffb0ab;border:1px solid rgba(229,57,53,.35);font-weight:900;font-size:12px;margin-bottom:10px}.question{font-size:18px;line-height:1.45;margin:8px 0 14px}.details{display:grid;gap:8px;margin:12px 0}.detail{background:#0d131b;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px;color:#d8dde5}.answer-row{display:grid;grid-template-columns:1fr auto;gap:10px;margin:14px 0}.answer-row input{width:100%;border-radius:14px;border:1px solid #344154;background:#091018;color:#fff;font-size:22px;font-weight:900;padding:12px 14px}.result{display:none;border-radius:16px;padding:14px;margin-top:12px;border:1px solid rgba(255,255,255,.12);background:#0e151d}.result.show{display:block}.result.good{border-color:rgba(34,197,94,.5);background:rgba(34,197,94,.08)}.result.bad{border-color:rgba(239,68,68,.5);background:rgba(239,68,68,.08)}.math{margin-top:12px;display:grid;gap:8px}.math div{background:#081018;border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px;color:#dfe5ec}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.error{padding:20px;border-radius:18px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);color:#ffd5d5}@media(max-width:860px){.layout{grid-template-columns:1fr}.scene-media{min-height:260px}.brand{font-size:20px}.btn{padding:10px 12px}.topbar-inner{align-items:flex-start}.nav-actions{justify-content:flex-end}.answer-row{grid-template-columns:1fr}.overlay-label{font-size:10px;padding:5px 7px}}
